name: Build Fork APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (full history for version info)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android build cache
        uses: actions/cache@v4
        with:
          path: ~/.android/build-cache
          key: ${{ runner.os }}-android-build-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'native/jni/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-android-build-cache-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Fork Release APK
        run: ./gradlew assembleForkRelease
        env:
          BRANCH_NAME: ${{ github.ref_name }}

      - name: Upload Fork APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fork-release-apk
          path: build/outputs/apk/fork/release/*.apk
          if-no-files-found: error
